<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Oasis - الواحة الخضراء</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            width: 100%;
            height: 100vh; /* ملء الشاشة بالكامل */
            background-image: url('https://image.spreadshirtmedia.net/image-server/v1/mp/products/T210A2MPA3304PT17X49Y26D195415712W11818H10000/views/1,width=1200,height=1200,appearanceId=2,backgroundColor=F2F2F2,version=1685360699/3d-landscape-render-sunny-river-forest-mountains-apron.jpg');
            background-size: cover; /* جعل الصورة تغطي الشاشة */
            background-position: center; /* توسط الصورة */
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            color: white; /* تغيير اللون لأبيض ليظهر فوق الصورة */
            font-size: 50px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5); /* إضافة ظل خفيف للنص */
            margin-bottom: 5px;
        }
        p {
            color: white; /* تغيير اللون لأبيض */
            font-size: 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Green Oasis</h1>
        <p>Experience the serenity of the river and lush nature.</p>
    </div>
</body>
</html>
