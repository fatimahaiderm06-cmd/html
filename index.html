<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع فاطمة حيدر</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        .bg-image {
            /* صورة طبيعية خلابة ومضمونة */
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop');
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .name-card {
            background-color: rgba(0,0,0, 0.4); /* تظليل شفاف وأنيق */
            color: white;
            padding: 50px 80px;
            text-align: center;
            backdrop-filter: blur(10px); /* تأثير زجاجي حديث */
            border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        h1 { 
            font-size: 80px; /* اسمكِ سيكون كبيراً وواضحاً */
            margin: 0;
            letter-spacing: 5px;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.5);
        }
        p { 
            font-size: 25px; 
            margin-top: 10px;
            color: #e0e0e0;
        }
    </style>
</head>
<body>

<div class="bg-image">
  <div class="name-card">
    <h1>FATIMA</h1>
    <p>مرحباً بكم في عالمي الخاص</p>
  </div>
</div>

</body>
</html>
